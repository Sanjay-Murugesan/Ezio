<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezio Automation – Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --navy: #07111f;
            --navy2: #0b1a2e;
            --navy3: #0f2244;
            --blue: #1a4a8a;
            --accent: #2a7fff;
            --glow: rgba(42, 127, 255, .35);
            --white: #eef3ff;
            --text: #7a99c0;
            --text2: #a8bcd8;
            --green: #00d68f;
            --red: #ff4d6d;
            --orange: #ffaa00;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--navy);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--blue);
            border-radius: 3px;
        }

        /* LOGIN */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 50%, rgba(26, 74, 138, .2) 0%, transparent 70%), var(--navy);
        }

        .login-box {
            width: 360px;
            border: 1px solid rgba(42, 127, 255, .2);
            padding: 48px 40px;
            background: rgba(11, 26, 46, .6);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .login-logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .login-sub {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .login-box input {
            width: 100%;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(42, 127, 255, .2);
            color: var(--white);
            padding: 14px 18px;
            font-family: 'Exo 2', sans-serif;
            font-size: 15px;
            outline: none;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 16px;
            transition: border-color .3s;
        }

        .login-box input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(90deg, #1a4a8a, #2a7fff);
            color: #fff;
            border: none;
            padding: 14px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            transition: box-shadow .3s;
        }

        .login-btn:hover {
            box-shadow: 0 0 28px rgba(42, 127, 255, .5);
        }

        .login-err {
            font-size: 13px;
            color: var(--red);
            margin-top: 14px;
            display: none;
        }

        /* DASHBOARD */
        #dashboard {
            display: none;
        }

        /* HEADER */
        .dash-header {
            background: rgba(7, 17, 31, .95);
            border-bottom: 1px solid rgba(42, 127, 255, .15);
            padding: 0 32px;
            height: 66px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .dash-logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .dash-logo span {
            color: var(--accent);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: rgba(255, 77, 109, .1);
            border: 1px solid rgba(255, 77, 109, .3);
            color: var(--red);
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: background .3s;
        }

        .logout-btn:hover {
            background: rgba(255, 77, 109, .2);
        }

        /* CONTENT */
        .dash-body {
            padding: 36px 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            padding: 28px 24px;
            border: 1px solid rgba(42, 127, 255, .12);
            background: linear-gradient(135deg, rgba(26, 74, 138, .08), transparent);
            transition: border-color .3s, transform .3s;
        }

        .stat-box:hover {
            border-color: rgba(42, 127, 255, .3);
            transform: translateY(-3px);
        }

        .s-label {
            font-size: 11px;
            letter-spacing: 2.5px;
            color: var(--text);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .s-val {
            font-family: 'Rajdhani', sans-serif;
            font-size: 40px;
            font-weight: 700;
            color: var(--accent);
        }

        .s-val.green {
            color: var(--green);
        }

        .s-val.orange {
            color: var(--orange);
        }

        .s-val.red {
            color: var(--red);
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .toolbar input {
            flex: 1;
            min-width: 200px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(42, 127, 255, .18);
            color: var(--white);
            padding: 10px 16px;
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .3s;
        }

        .toolbar input:focus {
            border-color: var(--accent);
        }

        .toolbar input::placeholder {
            color: rgba(120, 160, 200, .4);
        }

        .tb-btn {
            padding: 10px 20px;
            border: 1px solid rgba(42, 127, 255, .25);
            background: transparent;
            color: var(--text2);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all .25s;
            white-space: nowrap;
        }

        .tb-btn:hover,
        .tb-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .tb-btn.danger:hover {
            background: var(--red);
            border-color: var(--red);
        }

        /* TABLE */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid rgba(42, 127, 255, .1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: rgba(26, 74, 138, .2);
            border-bottom: 1px solid rgba(42, 127, 255, .2);
        }

        th {
            padding: 14px 18px;
            text-align: left;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid rgba(42, 127, 255, .06);
            transition: background .2s;
        }

        tbody tr:hover {
            background: rgba(42, 127, 255, .04);
        }

        tbody tr.unread {
            border-left: 3px solid var(--accent);
        }

        td {
            padding: 14px 18px;
            font-size: 13px;
            color: var(--text2);
            vertical-align: top;
        }

        td.name-cell {
            color: var(--white);
            font-weight: 600;
        }

        td.msg-cell {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge-new {
            display: inline-block;
            background: rgba(42, 127, 255, .15);
            border: 1px solid rgba(42, 127, 255, .3);
            color: var(--accent);
            font-size: 9px;
            letter-spacing: 2px;
            padding: 2px 8px;
            text-transform: uppercase;
            margin-left: 6px;
            vertical-align: middle;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .act {
            padding: 5px 12px;
            font-size: 11px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border: 1px solid;
            background: transparent;
            transition: background .2s;
        }

        .act.read {
            border-color: rgba(0, 214, 143, .3);
            color: var(--green);
        }

        .act.read:hover {
            background: rgba(0, 214, 143, .1);
        }

        .act.del {
            border-color: rgba(255, 77, 109, .3);
            color: var(--red);
        }

        .act.del:hover {
            background: rgba(255, 77, 109, .1);
        }

        /* STATUS TAG */
        .status {
            font-size: 10px;
            letter-spacing: 2px;
            padding: 3px 10px;
            border: 1px solid;
            text-transform: uppercase;
        }

        .status.new {
            border-color: rgba(42, 127, 255, .4);
            color: var(--accent);
            background: rgba(42, 127, 255, .08);
        }

        .status.read {
            border-color: rgba(0, 214, 143, .3);
            color: var(--green);
            background: rgba(0, 214, 143, .06);
        }

        /* MODAL */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(7, 17, 31, .85);
            backdrop-filter: blur(6px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-bg.show {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 560px;
            background: var(--navy2);
            border: 1px solid rgba(42, 127, 255, .2);
            padding: 40px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 24px;
            color: var(--accent);
        }

        .modal-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: flex-start;
        }

        .modal-key {
            flex: 0 0 110px;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text);
            text-transform: uppercase;
            padding-top: 2px;
        }

        .modal-val {
            font-size: 14px;
            color: var(--white);
            line-height: 1.7;
            flex: 1;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            transition: color .2s;
        }

        .modal-close:hover {
            color: var(--red);
        }

        /* EMPTY STATE */
        .empty {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 52px;
            margin-bottom: 20px;
            opacity: .3;
        }

        .empty p {
            font-size: 15px;
            color: var(--text);
            letter-spacing: 1px;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .stats-row {
                grid-template-columns: 1fr 1fr;
            }

            .dash-body {
                padding: 24px 16px;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-logo">EZIO</div>
            <div class="login-sub">Admin Dashboard</div>
            <input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
            <button type="button" class="login-btn" onclick="login()">ACCESS DASHBOARD</button>
            <div class="login-err" id="loginErr">❌ Incorrect password. Try again.</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div class="dash-header">
            <div class="dash-logo">EZIO <span>AUTOMATION</span> — Admin</div>
            <div class="header-right">
                <span style="font-size:12px;color:var(--text);" id="lastUpdated"></span>
                <button class="logout-btn" onclick="logout()">LOGOUT</button>
            </div>
        </div>

        <div class="dash-body">
            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-box">
                    <div class="s-label">Total Enquiries</div>
                    <div class="s-val" id="statTotal">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">Unread</div>
                    <div class="s-val orange" id="statUnread">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">This Month</div>
                    <div class="s-val green" id="statMonth">0</div>
                </div>
                <div class="stat-box">
                    <div class="s-label">Today</div>
                    <div class="s-val" id="statToday">0</div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="Search by name, email, company, service..."
                    oninput="renderTable()">
                <button class="tb-btn active" id="filtAll" onclick="setFilter('all',this)">All</button>
                <button class="tb-btn" id="filtNew" onclick="setFilter('new',this)">Unread</button>
                <button class="tb-btn" id="filtRead" onclick="setFilter('read',this)">Read</button>
                <button class="tb-btn" onclick="exportCSV()">⬇ Export CSV</button>
                <button class="tb-btn danger" onclick="clearAll()">🗑 Clear All</button>
            </div>

            <!-- Table -->
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date & Time</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Company</th>
                            <th>Service</th>
                            <th>Message</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="empty" id="emptyState" style="display:none;">
                <div class="empty-icon">📭</div>
                <p>No enquiries found. They will appear here once the contact form is submitted.</p>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div class="modal-bg" id="modalBg" onclick="closeModal(event)">
        <div class="modal" id="modalBox">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3>Enquiry Details</h3>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        //  CHANGE YOUR PASSWORD HERE ↓
        const ADMIN_PASSWORD = 'ezio2025';
        // ═══════════════════════════════════════
        const STORAGE_KEY = 'ezio_enquiries';
        let currentFilter = 'all';

        // ── AUTH ──
        function login() {
            const pw = document.getElementById('pwInput').value;
            if (pw === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                sessionStorage.setItem('ezio_auth', '1');
                loadDashboard();
            } else {
                document.getElementById('loginErr').style.display = 'block';
                document.getElementById('pwInput').value = '';
            }
        }
        function logout() {
            sessionStorage.removeItem('ezio_auth');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('pwInput').value = '';
        }
        // Auto-login if session active
        if (sessionStorage.getItem('ezio_auth') === '1') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadDashboard();
        }

        // ── DATA ──
        function getEnquiries() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch { return []; }
        }
        function saveEnquiries(arr) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
        }

        // ── LOAD ──
        function loadDashboard() {
            updateStats();
            renderTable();
            document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        }

        // ── STATS ──
        function updateStats() {
            const data = getEnquiries();
            const now = new Date();
            const todayStr = now.toDateString();
            const monthStr = now.getMonth() + '-' + now.getFullYear();
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statUnread').textContent = data.filter(e => e.status === 'new').length;
            document.getElementById('statMonth').textContent = data.filter(e => {
                const d = new Date(e.timestamp);
                return d.getMonth() + '-' + d.getFullYear() === monthStr;
            }).length;
            document.getElementById('statToday').textContent = data.filter(e => new Date(e.timestamp).toDateString() === todayStr).length;
        }

        // ── TABLE ──
        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
        }
        function renderTable() {
            let data = getEnquiries();
            const q = document.getElementById('searchInput').value.toLowerCase();
            if (q) {
                data = data.filter(e =>
                    (e.name || '').toLowerCase().includes(q) ||
                    (e.email || '').toLowerCase().includes(q) ||
                    (e.company || '').toLowerCase().includes(q) ||
                    (e.service || '').toLowerCase().includes(q) ||
                    (e.message || '').toLowerCase().includes(q)
                );
            }
            if (currentFilter !== 'all') data = data.filter(e => e.status === currentFilter);
            data = [...data].reverse(); // newest first

            const tbody = document.getElementById('tableBody');
            const empty = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if (data.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            data.forEach((e, i) => {
                const d = new Date(e.timestamp);
                const dateStr = d.toLocaleDateString('en-IN') + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                const tr = document.createElement('tr');
                if (e.status === 'new') tr.classList.add('unread');
                tr.innerHTML = `
      <td>${e.id}</td>
      <td style="white-space:nowrap;font-size:12px;">${dateStr}</td>
      <td class="name-cell">${esc(e.name)} ${e.status === 'new' ? '<span class="badge-new">NEW</span>' : ''}</td>
      <td><a href="mailto:${esc(e.email)}" style="color:var(--accent);text-decoration:none;">${esc(e.email)}</a></td>
      <td>${esc(e.phone)}</td>
      <td>${esc(e.company)}</td>
      <td style="white-space:nowrap;">${esc(e.service)}</td>
      <td class="msg-cell" title="${esc(e.message)}">${esc(e.message)}</td>
      <td><span class="status ${e.status}">${e.status}</span></td>
      <td><div class="action-btns">
        <button class="act read" onclick="viewEnquiry('${e.id}')">VIEW</button>
        ${e.status === 'new' ? `<button class="act read" onclick="markRead('${e.id}')">✓ READ</button>` : ''}
        <button class="act del" onclick="deleteEnquiry('${e.id}')">DEL</button>
      </div></td>`;
                tbody.appendChild(tr);
            });
        }

        // ── ACTIONS ──
        function markRead(id) {
            const data = getEnquiries().map(e => e.id === id ? { ...e, status: 'read' } : e);
            saveEnquiries(data);
            loadDashboard();
        }
        function deleteEnquiry(id) {
            if (!confirm('Delete this enquiry?')) return;
            saveEnquiries(getEnquiries().filter(e => e.id !== id));
            loadDashboard();
        }
        function clearAll() {
            if (!confirm('Delete ALL enquiries? This cannot be undone.')) return;
            saveEnquiries([]);
            loadDashboard();
        }

        // ── MODAL ──
        function viewEnquiry(id) {
            const e = getEnquiries().find(x => x.id === id);
            if (!e) return;
            markRead(id);
            const d = new Date(e.timestamp);
            document.getElementById('modalContent').innerHTML = `
    <div class="modal-row"><div class="modal-key">Date</div><div class="modal-val">${d.toLocaleString('en-IN')}</div></div>
    <div class="modal-row"><div class="modal-key">Name</div><div class="modal-val">${esc(e.name)}</div></div>
    <div class="modal-row"><div class="modal-key">Email</div><div class="modal-val"><a href="mailto:${esc(e.email)}" style="color:var(--accent)">${esc(e.email)}</a></div></div>
    <div class="modal-row"><div class="modal-key">Phone</div><div class="modal-val">${esc(e.phone)}</div></div>
    <div class="modal-row"><div class="modal-key">Company</div><div class="modal-val">${esc(e.company)}</div></div>
    <div class="modal-row"><div class="modal-key">Service</div><div class="modal-val">${esc(e.service)}</div></div>
    <div class="modal-row"><div class="modal-key">Message</div><div class="modal-val" style="white-space:pre-wrap;">${esc(e.message)}</div></div>
    <div style="margin-top:24px;">

  <textarea
    id="replyMessage"
    placeholder="Type reply to customer..."
    style="
      width:100%;
      min-height:120px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(42,127,255,.2);
      color:#fff;
      padding:14px;
      margin-bottom:14px;
      resize:vertical;
      font-family:'Exo 2',sans-serif;
    "
  ></textarea>

  <button
    onclick="sendReply('${esc(e.email)}')"
    style="
      display:inline-block;
      background:linear-gradient(90deg,#1a4a8a,#2a7fff);
      color:#fff;
      border:none;
      padding:12px 28px;
      font-family:'Rajdhani',sans-serif;
      font-weight:700;
      font-size:14px;
      letter-spacing:2px;
      cursor:pointer;
    "
  >
    ✉ SEND REPLY
  </button>

</div>`;
            document.getElementById('modalBg').classList.add('show');
        }
        function closeModal(e) {
            if (!e || e.target === document.getElementById('modalBg') || e.currentTarget.classList.contains('modal-close')) {
                document.getElementById('modalBg').classList.remove('show');
                loadDashboard();
            }
        }

        // ── SEND REPLY ──
        async function sendReply(email) {
            const msgBox = document.getElementById('replyMessage');
            if (!msgBox) {
                alert('Reply box not found');
                return;
            }
            const msg = msgBox.value.trim();
            if (!msg) {
                alert('Please type a message');
                return;
            }

            try {
                await emailjs.send(
                    'service_m9fs1el',
                    'template_tahmwzb',
                    {
                        from_name: 'Ezio Automation',
                        from_email: 'ezioautomation@gmail.com',
                        from_phone: 'Admin Reply',
                        company: 'Ezio Automation',
                        service: 'Customer Support',
                        message: msg,
                        to_email: email,
                        reply_to: email
                    }
                );

                const replies = JSON.parse(localStorage.getItem('ezio_replies') || '[]');
                replies.push({
                    email: email,
                    message: msg,
                    time: new Date().toISOString()
                });
                localStorage.setItem('ezio_replies', JSON.stringify(replies));

                alert('Reply sent successfully');
                msgBox.value = '';

            } catch (err) {
                console.error('SEND REPLY ERROR:', err);
                alert('Failed to send reply');
            }
        }

        // ── EXPORT CSV ──
        function exportCSV() {
            const data = getEnquiries();
            if (!data.length) { alert('No enquiries to export.'); return; }
            const headers = ['ID', 'Date', 'Name', 'Email', 'Phone', 'Company', 'Service', 'Message', 'Status'];
            const rows = data.map(e => [
                e.id, new Date(e.timestamp).toLocaleString('en-IN'),
                e.name, e.email, e.phone, e.company, e.service,
                '"' + (e.message || '').replace(/"/g, '""') + '"', e.status
            ]);
            const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ezio_enquiries_' + new Date().toISOString().slice(0, 10) + '.csv';
            a.click();
        }

        // ── HELPERS ──
        function esc(s) {
            if (!s) return '—';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
